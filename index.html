<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Business Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- The main card wrapper -->
    <div class="business-card">
        
        <!-- Header: Name and Title -->
        <div class="card-header">
            <h1 class="name">Anson Joice</h1>
            <p class="title">Web Developer</p>
        </div>

        <!-- Body: Short Bio -->
        <div class="card-body">
            <p class="bio">
                I build simple, clean, and responsive websites using HTML and CSS. Loving my front-end development journey!
            </p>
        </div>

        <!-- Footer: Contact Information -->
        <div class="card-footer">
            <p class="email">📧 anson@email.com</p>
        </div>

    </div>

</body>
</html>
